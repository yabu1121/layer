name: Flutter

on:
  push:
    branches: ["main"]
    paths:
      - "mobile/**"
  pull_request:
    branches: ["main"]
    paths:
      - "mobile/**"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      # .env は秘匿のため Git 管理外（.gitignore）。pubspec.yaml が .env を
      # アセット宣言しているため、CI では .env.example から生成して
      # `flutter analyze` の asset_does_not_exist を防ぐ。
      - name: Create .env from example
        run: cp .env.example .env

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test
