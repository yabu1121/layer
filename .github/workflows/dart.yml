name: Flutter

on:
  push:
    branches: ["main"]
    paths:
      - "mobile/**"
  pull_request:
    branches: ["main"]
    paths:
      - "mobile/**"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test
