<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="layer">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>layer</title>
  <link rel="manifest" href="manifest.json">

  <!-- Google サインイン（GIS / google_sign_in_web）用のクライアント ID -->
  <meta name="google-signin-client_id"
        content="320451201665-6i73idon7efp6u8uuv0qkf2i8i4kqgsm.apps.googleusercontent.com">


  <!-- Google Maps JavaScript API（google_maps_flutter web 用）。
       ※実タイル表示には Maps JavaScript API 有効化 + リファラ許可された
       ブラウザキーが必要。キーはブラウザに露出するため必ず制限をかけること。 -->
  <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_MAPS_JS_API_KEY"></script>
  <!-- Web でのクラスタリング（clusterManagers）に必須:
       google_maps_flutter_web は MarkerClusterer ライブラリを参照する。 -->
  <script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
